# ==============================================================
# Nginx Configuration — SPA Routing + Aggressive Asset Caching
# ==============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    # ── SPA Routing (prevent 404 on client-side routes) ──────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Aggressive Cache for hashed assets (Vite output) ─────
    # Vite produces assets with content hashes in filenames,
    # so they can be cached forever (immutable).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Cache for static media files ─────────────────────────
    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|mp4|webm|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Disable access to hidden files ───────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
